appId: com.shendal.browser
productName: Shendal Browser
directories:
  output: dist
  buildResources: assets
files:
  - "**/*"
  - "!dist"
  - "!.git"
  - "!icon *.png"
  - "!icon*.png"
win:
  target: 
    - portable
    - nsis
  icon: assets/icon.png
portable:
  requestExecutionLevel: user
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
