<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shendal Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-bar"></div>

  <!-- ═══ BAR LEFT ═══ -->
  <div class="bar bar-left" id="bar-left">
    <button id="btn-back" class="bar-btn disabled" title="Back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-forward" class="bar-btn disabled" title="Forward">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-reload" class="bar-btn" title="Reload">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5M13.5 2.5v3h-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- ═══ BAR CENTER ═══ -->
  <div class="bar bar-center" id="bar-center">
    <div class="tabs-section">
      <div id="tabs" class="tabs"></div>
      <button id="btn-new-tab" class="bar-btn tab-add" title="New Tab (Ctrl+T)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-split" class="bar-btn tab-add split-btn" title="Split Screen">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>



    <div class="search-container" id="search-container">
      <div id="search-engine-badge" class="search-badge hidden">
        <img id="badge-icon" src="" alt="">
        <span id="badge-name"></span>
        <span class="badge-remove" id="badge-remove" title="Remove filter">×</span>
      </div>
      <input id="search-input" type="text" placeholder="Search Google or enter URL" autocomplete="off" spellcheck="false">
      <button id="btn-voice" class="voice-btn" title="Voice Search">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="5.5" y="1.5" width="5" height="8" rx="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 7.5a5 5 0 0 0 10 0M8 13v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>

    <button id="btn-star" class="bar-btn star-btn" title="Bookmark">
      <svg id="star-icon" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.85 3.75L14 5.85l-3 2.92.71 4.13L8 10.88 4.29 12.9 5 8.77 2 5.85l4.15-.6L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
    </button>

    <!-- Extensions button -->
    <button id="btn-extensions" class="bar-btn ext-btn" title="Extensions">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M9.5 2.5a1.5 1.5 0 00-3 0V4H4.5A1.5 1.5 0 003 5.5v1.75h1.5a1.5 1.5 0 010 3H3v1.75A1.5 1.5 0 004.5 13.5h1.75V12a1.5 1.5 0 013 0v1.5h1.75a1.5 1.5 0 001.5-1.5v-2h1.5a1.5 1.5 0 000-3h-1.5V5.5A1.5 1.5 0 0011.5 4H9.5V2.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
    </button>
    
    <!-- Downloads button -->
    <button id="btn-downloads" class="bar-btn downloads-btn" title="Downloads">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 12V3M5 9l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>

    <div id="ext-buttons" class="ext-buttons"></div>
    <div id="bookmarks" class="bookmarks"></div>
  </div>

  <!-- ═══ BAR DRAG ═══ -->
  <div class="bar bar-drag hidden" id="bar-drag" title="Drag Window"></div>

  <!-- ═══ BAR RIGHT ═══ -->
  <div class="bar bar-right" id="bar-right">
    <!-- PiP -->
    <button id="btn-pip" class="bar-btn pip-btn hidden" title="Picture in Picture">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="3" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="7" width="5.5" height="4" rx="1" fill="currentColor" opacity="0.5"/></svg>
    </button>
    <button id="btn-theme" class="bar-btn" title="Toggle Theme">
      <svg id="icon-moon" class="theme-icon" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.9 10.4A6.5 6.5 0 0 1 5.6 2.1a6.5 6.5 0 1 0 8.3 8.3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      <svg id="icon-sun" class="theme-icon hidden" width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-autohide" class="bar-btn autohide-btn" title="Auto-Hide (Ctrl+Shift+H)">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M1 8s3-5.5 7-5.5S15 8 15 8s-3 5.5-7 5.5S1 8 1 8z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.3"/></svg>
    </button>
    <div class="bar-sep"></div>
    <button id="btn-minimize" class="bar-btn" title="Minimize">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-resize" class="bar-btn" title="Window Mode">
      <svg id="icon-resize" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="2.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
    <button id="btn-quit" class="bar-btn btn-close" title="Close">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 3.5l7 7M10.5 3.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- Tab Preview -->
  <div id="tab-preview" class="tab-preview"></div>

  <!-- Extensions Panel -->
  <div id="ext-panel" class="ext-panel hidden">
    <div class="ext-panel-header">
      <span>Extensions</span>
      <button id="ext-load-btn" class="ext-panel-action" title="Load Extension">+ Load</button>
    </div>
    <div class="ext-panel-toggle">
      <span>Built-in Ad Blocker</span>
      <label class="switch"><input type="checkbox" id="adblock-toggle" aria-label="Toggle built-in AdBlocker" checked><span class="slider"></span></label>
    </div>
    <div class="ext-sep"></div>
    <div id="ext-list" class="ext-list"></div>
    <div class="ext-panel-footer">
      <button id="clear-data-btn" class="ext-panel-action destructive">Clear browsing data</button>
    </div>
  </div>

  <!-- Downloads Panel -->
  <div id="downloads-panel" class="ext-panel hidden">
    <div class="ext-panel-header">
      <span>Downloads</span>
    </div>
    <div class="ext-sep"></div>
    <div id="downloads-list" class="ext-list"></div>
    <div class="ext-panel-footer downloads-footer">
      <button id="downloads-folder-btn" class="ext-panel-action" title="Open Downloads Folder">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4a2 2 0 012-2h3.5l1.5 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Context Menu Overlay -->
  <div id="ctx-overlay" class="ctx-overlay hidden"></div>

  <!-- Webview Container -->
  <div id="webview-container"></div>
  
  <div id="split-resizer" class="hidden"></div>
  <div id="split-picker" class="hidden">
    <div class="sp-header">
      <span class="sp-title">Select a tab to split</span>
      <button id="sp-close" class="bar-btn" title="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 3.5l7 7M10.5 3.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="sp-grid" class="sp-grid"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
